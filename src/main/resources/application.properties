spring.application.name=edufin-backend
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# ===============================
# DATABASE CONFIGURATION (PostgreSQL)
# ===============================
# Railway inyectará DB_URL, DB_USER y DB_PASSWORD. Si estás en local, usará lo que está después de los ':'
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/edufinance_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Prueba16!}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ==========================================
# CONFIGURACIÓN DE CORREO
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:diego44434@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================
# CONFIGURACIÓN DE JWT
# ==========================================
app.jwt.secret=${JWT_SECRET:EstaEsUnaClaveSuperSecretaYMuyLargaQueTieneMasDe64CaracteresParaCumplirConHS5122026EduFinUPC}
app.jwt.expiration-ms=3600000